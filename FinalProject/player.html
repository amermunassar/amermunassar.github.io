<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player - Chess.com Lookup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar bg-success mb-4">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="index.html">Chess.com Lookup</a>
      <a href="index.html" class="btn btn-light btn-sm">Back to Leaderboard</a>
    </div>
  </nav>

  <div class="container pb-5">

    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <label class="form-label mb-1">Search for a player</label>
        <div class="row g-2">
          <div class="col-md-9">
            <input type="text" id="searchUsername" class="form-control" placeholder="Enter username">
          </div>
          <div class="col-md-3">
            <button class="btn btn-success w-100" onclick="searchPlayer()">Search</button>
          </div>
        </div>
      </div>
    </div>

    <div id="profile"></div>
    <div id="stats"></div>

  </div>

  <script src="player.js"></script>
</body>
</html>
